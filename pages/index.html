<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MusiWeb</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsmediatags/3.9.5/jsmediatags.min.js"></script>
</head>
<body>
    <div class="vis">
        <div class="topbar">
            <b>MusiWeb</b>
        </div>
        <div class="sidemenu">
            <item onclick="tabby('home')" id="item-menu-home">Home</item>
            <item onclick="tabby('playlist')" id="item-menu-playlist">Playlist</item>
            <item onclick="tabby('online')" id="item-menu-online">Online Playlists</item>
            <item onclick="tabby('settings')" id="item-menu-settings">Settings</item>
            <item onclick="tabby('about')" id="item-menu-about">About</item>
            <item></item>
            <item onclick="tabby('plugins')">Plugins</item>
            <item></item>
            <item></item>
            <item></item>
            <item></item>
            <item></item>
            <item></item>
            <item></item>
            <item></item>
            <div class="metadata">
                <div id="meta-albumart" class="albumart"></div>
                <div class="lazyhorizontal">
                    <p id="meta-title">Title</p>
                    <p> | </p>
                    <p id="meta-artist">Artist</p>
                   
                </div>
                <div class="controlpanel">
                    <p><img src="images/play.svg" onclick="sound(null, null, 'play', 'cont')"></img></p>
                    <p><img src="images/pause.svg" onclick="sound(null, null, 'pause', 'cont')"></img></p>
                    <p><img src="images/stop.svg" onclick="sound(null, null, 'stop', 'cont')"></img></p>
                </div>
            </div>
        </div>
        <div class="mainmenu">
            <div id="item-main-0" style="background-color: #e5e5e5;width: 100%;height: 25px;justify-content: left;position: relative;top: 0;left: 0;"></div>
            <item id="item-main-1"></item>
            <item id="item-main-2"></item>
            <item id="item-main-3"></item>
            <item id="item-main-4"></item>
            <item id="item-main-5"></item>

            <item id="item-main-7"></item>
            <item id="item-main-8"></item>
            <item id="item-main-9"></item>
            <item id="item-main-10"></item>
            <item id="item-main-11"></item>
            <item id="item-main-12"></item>
            <item id="item-main-13"></item>
            <item id="item-main-14"></item>
            <item id="item-main-15"></item>
            <item id="item-main-16"></item>
            <item id="item-main-17"></item>
            <item id="item-main-18"></item>
            <item id="item-main-19"></item>

            <item id="item-main-unused"></item>



                <div class="infobox" id="info-infobox">
                    <b>Welcome to MusiWeb</b>
                    <p style="margin-bottom:0;">This is an online music player. We do not host any music files here, so you will have to supply your own.</p>
                    <p style="margin-top:5px;">You can add your own music files, or browse our collection of public playlists.</p>
                </div>
        </div>
    <p></p>
    </div>
    <audio id="audioplayer" controls style="width: 0;height: 0;visibility: hidden;position: absolute;left: -9999px;">
        <source id="audiosource" src="null" type="audio/mpeg">
    </audio>
    <input type="file" accept=".mp3,.wav,.aiff,.ogg" id="fileInput" style="visibility: hidden;position: absolute;left: -9999px;">
    <script src="index.js"></script>
</body>
</html>
